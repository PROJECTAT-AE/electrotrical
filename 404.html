<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>404 — Page Not Found | ElectroTrical</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary:    #0066FF;
  --cyan:       #00D4FF;
  --dark:       #0A0F1E;
  --dark-800:   #0D1424;
  --dark-700:   #111827;
  --border:     rgba(255,255,255,0.08);
  --text:       #F0F4FF;
  --text-muted: #6B7280;
  --font-sans:  'Inter', sans-serif;
  --font-mono:  'JetBrains Mono', monospace;
}

html, body {
  height: 100%;
  background: var(--dark);
  color: var(--text);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}

/* Subtle grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,102,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,102,255,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

/* Glow blobs */
.glow-1 {
  position: fixed;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,102,255,0.12) 0%, transparent 70%);
  top: -200px; left: -200px;
  pointer-events: none;
}
.glow-2 {
  position: fixed;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 70%);
  bottom: -100px; right: -100px;
  pointer-events: none;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 560px;
  width: 100%;
}

/* Logo */
.logo {
  display: inline-flex;
  align-items: center;
  text-decoration: none;
  margin-bottom: 3rem;
}
.logo img { height: 44px; width: auto; }

/* PCB trace decoration */
.pcb-art {
  margin: 0 auto 2rem;
  width: 120px;
  opacity: 0.6;
}

/* 404 number */
.error-code {
  font-family: var(--font-mono);
  font-size: clamp(80px, 18vw, 140px);
  font-weight: 600;
  line-height: 1;
  letter-spacing: -4px;
  background: linear-gradient(135deg, var(--primary), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.5rem;
}

.error-label {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--cyan);
  margin-bottom: 1.5rem;
}

.error-title {
  font-size: clamp(20px, 4vw, 28px);
  font-weight: 700;
  color: var(--text);
  margin-bottom: 0.75rem;
}

.error-desc {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.7;
  margin-bottom: 2.5rem;
}

/* Buttons */
.btn-group {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 13px 28px;
  background: var(--primary);
  color: #fff;
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 600;
  border-radius: 8px;
  text-decoration: none;
  transition: background 0.2s, transform 0.15s;
}
.btn-primary:hover { background: #3388FF; transform: translateY(-1px); }

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 13px 28px;
  background: transparent;
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 500;
  border: 1px solid var(--border);
  border-radius: 8px;
  text-decoration: none;
  transition: border-color 0.2s, transform 0.15s;
}
.btn-secondary:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-1px); }

/* Quick links */
.quick-links {
  margin-top: 3rem;
  padding-top: 2rem;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 2rem;
  justify-content: center;
  flex-wrap: wrap;
}
.quick-link {
  font-size: 13px;
  color: var(--text-muted);
  text-decoration: none;
  transition: color 0.2s;
}
.quick-link:hover { color: var(--cyan); }
</style>
</head>
<body>
  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <div class="container">

    <!-- Logo -->
    <a href="index.html" class="logo">
      <img src="Logo/navbar_logo.png" alt="ElectroTrical">
    </a>

    <!-- PCB trace art -->
    <svg class="pcb-art" viewBox="0 0 120 80" fill="none">
      <rect x="2" y="2" width="116" height="76" rx="6" stroke="#0066FF" stroke-width="1.5"/>
      <line x1="20" y1="2" x2="20" y2="20" stroke="#0066FF" stroke-width="1.5"/>
      <line x1="20" y1="20" x2="50" y2="20" stroke="#0066FF" stroke-width="1.5"/>
      <line x1="50" y1="20" x2="50" y2="40" stroke="#00D4FF" stroke-width="1.5"/>
      <line x1="50" y1="40" x2="80" y2="40" stroke="#00D4FF" stroke-width="1.5"/>
      <line x1="80" y1="40" x2="80" y2="20" stroke="#0066FF" stroke-width="1.5"/>
      <line x1="80" y1="20" x2="100" y2="20" stroke="#0066FF" stroke-width="1.5"/>
      <circle cx="20" cy="20" r="4" stroke="#0066FF" stroke-width="1.5" fill="none"/>
      <circle cx="50" cy="40" r="4" fill="#00D4FF" opacity="0.6"/>
      <circle cx="80" cy="20" r="4" stroke="#0066FF" stroke-width="1.5" fill="none"/>
      <rect x="34" y="48" width="16" height="12" rx="2" stroke="#00D4FF" stroke-width="1.2"/>
      <rect x="60" y="52" width="24" height="8" rx="2" stroke="#0066FF" stroke-width="1.2"/>
      <text x="37" y="57" font-size="5" fill="#00D4FF" font-family="monospace">IC</text>
      <!-- Question mark chip -->
      <rect x="88" y="46" width="20" height="20" rx="3" stroke="#00D4FF" stroke-width="1.5"/>
      <text x="93" y="60" font-size="11" fill="#00D4FF" font-family="monospace" font-weight="600">?</text>
    </svg>

    <div class="error-code">404</div>
    <div class="error-label">Signal Lost</div>

    <h1 class="error-title">This page doesn't exist</h1>
    <p class="error-desc">
      The page you're looking for has been moved, deleted, or never existed.
      Let's get you back on track.
    </p>

    <div class="btn-group">
      <a href="index.html" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Back to Home
      </a>
      <a href="dashboard.html" class="btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        My Dashboard
      </a>
    </div>

    <div class="quick-links">
      <a href="index.html#services" class="quick-link">Services</a>
      <a href="index.html#quote" class="quick-link">Get a Quote</a>
      <a href="index.html#portfolio" class="quick-link">Portfolio</a>
      <a href="index.html#contact" class="quick-link">Contact</a>
      <a href="privacy.html" class="quick-link">Privacy Policy</a>
    </div>

  </div>
</body>
</html>
